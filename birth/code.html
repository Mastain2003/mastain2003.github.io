		<input type="color" name="" oninput="shirtColor(this)">

	<script type="text/javascript">
		function shirtColor(c){
			document.getElementsByTagName('path')[0].style.fill=c.value;
			document.getElementsByTagName('path')[1].style.fill=colorDarkenArr(RGBArray(c.value),0.5);
			document.getElementsByTagName('path')[2].style.fill=colorDarkenArr(RGBArray(c.value),0.75);
			//console.log(colorDarkenArr(RGBArray(c.value),0.5))
			//RGBArray(c.value);
		}
		function RGBArray(color){
			let arr = [0,0,0];
			//console.log("0x"+color.substring(1,3));
			arr[0] = parseInt(color.substring(1,3),16);
			arr[1] = parseInt(color.substring(3,5),16);
			arr[2] = parseInt(color.substring(5),16);
			//console.log(color);
			//console.log(arr);
			return arr;
		}
		function colorDarkenArr(arr,factor){
			arr[0] = darkenPigment(arr[0],factor);
			arr[1] = darkenPigment(arr[1],factor);
			arr[2] = darkenPigment(arr[2],factor);
			return "#"+arr[0]+arr[1]+arr[2];
		}
		function darkenPigment(pigment,f){
			pigment=pigment*(1-f);
			pigment=parseInt(pigment).toString(16);
			if(pigment.length==1)
				pigment = '0'+pigment;
			//console.log(pigment)
			return pigment
		}
		function colorlightenArr(arr,factor){
			arr[0] = lightenPigment(arr[0],factor);
			arr[1] = lightenPigment(arr[1],factor);
			arr[2] = lightenPigment(arr[2],factor);
			return "#"+arr[0]+arr[1]+arr[2];
		}
		function lightenPigment(pigment,f){
			pigment+=(255-pigment)*f;
			pigment=parseInt(pigment).toString(16);
			if(pigment.length==1)
				pigment = '0'+pigment;
			return pigment
		}
	</script>
