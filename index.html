<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>My Website</title>
		<link rel="stylesheet" type="text/css" href="/css/default.css">
		<link rel="icon" type="image/png" href="/img/icon.png">
		
		<!--<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">-->
	</head>
	<body>
		<header class="fixed app-header flex">
			<div class="flex" style="width: 100%;justify-content: space-between;" >
				<div class="container pannel-link subNavIcon" data-pannelRef="subNav">
					<div class="icon-action">
						<i class="fas fa-bars"></i>	
					</div>
				</div>
				
				<a href="/index.html" class="internal">
					<div class="container flex logo">
						<div class="placeholders imgContainer">
							<img src="/img/icon.png">
						</div>
						<div class="container title">
							<span id="fname">Prakhar</span>
							<span id="sname">Mastain</span>
						</div>
					</div>
				</a>
				<div class="settings container">
					<div class="icon-action" onclick="toggleOnlineMode(this)">
						<i class="fas fa-bell"></i>
					</div>
					<div class="icon-action" onclick="toggleDarkMode(this)">
						<i class="fas fa-moon"></i>
					</div>
				</div>
			</div>
			<nav>
				<a href="/home/" class="menu internal">
					<div class="navItemWrapper" id="home">
						<div><i class="fas fa-home"></i></div>
						<div><span>Home</span></div>
					</div>
				</a>
				<a href="/profile/" class="menu internal">
					<div class="navItemWrapper" id="profile">
						<div><i class="fas fa-laptop-code"></i></div>
						<div><span>Profession</span></div>
					</div>
				</a>
				<a href="/charity/" class="menu internal">
					<div class="navItemWrapper" id="smile">
						<div><i class="fas fa-hands"></i></div>
						<div><span>Contribute</span></div>
					</div>
				</a>
				<a href="/contact/" class="menu internal">
					<div class="navItemWrapper" id="contact">
						<div><i class="fas fa-phone-alt"></i></div>
						<div><span>Contact</span></div>
					</div>
				</a>
			</nav>
		</header>
		<noscript>
			<div class="headerCopy"></div>
		</noscript>
		<div class="body">
			<div class="adjustDiv" id='behindHeader'></div>
			<div class="page-content" style="position: relative;"></div>
			<div class="adjustDiv" id='behindFooter'></div>
		</div>
		<div class="subNav pannel" data-pannelId="subNav">
			<div class="overlay"></div>
			<div class="container">
				<header>
					<div class="closeSubMenu" onclick="$(this).parent().parent().parent().removeClass('active')">
						<span class="close">X</span>
					</div>
					<div class="container subNav-header-content">
						<div class="subNav-header-content-logo placeholder">
							<img src="/img/icon.png">
						</div>
						<div class="subNav-header-content-title placeholder">
							<p></p>
						</div>
					</div>
				</header>
				<div class="content">
					<ul class="menuList"></ul>
					<div class="slideRight">
						<span></span>
						<!--<i class="fas fa-angle-double-right"></i>-->
					</div>
				</div>
			</div>
		</div>
		<script src="https://kit.fontawesome.com/b557ca3862.js" crossorigin="anonymous"></script>
		<script type="text/javascript" src="/js/lib/jquery-3.5.1.js"></script>
		<script type="text/javascript" src="/js/lib/typeWriter-lib.js"></script>
		<script type="text/javascript" src="/js/lib/gallary-lib.js"></script>
		<script type="text/javascript" src="/js/lib/swipe-lib.js"></script>
		<!--<script type="text/javascript" src='/js/default.js'></script>-->
		<script type="text/javascript" src="/js/app.js"></script>
	</body>
</html>
