					</div>

			<nav>

					<div class="navItemWrapper" id="home">
						<div><i class="fas fa-home"></i></div>

					</div>
					<div class="container subNav-header-content">

							<picture>
								<source class="lazyLoad" type="image/webp" srcset="/img/logo-b&w/logo-b&w-placeholder.webp"  data-srcset="/img/logo-b&w/logo-b&w-S.webp 96w, /img/logo-b&w/logo-b&w-M.webp 156w, /img/logo-b&w/logo-b&w.webp 216w" sizes="13vw">
